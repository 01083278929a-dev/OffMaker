name: Java CI with Gradle and Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # NOTE: 현재 레포에 리눅스용 ./gradlew 가 없어서, Actions에서 Gradle을 설치해 gradle 명령으로 빌드합니다.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build with Gradle (skip tests)
        run: gradle build -x test

      - name: Upload JAR to Oracle Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 158.180.68.211
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app/releases"
          strip_components: 2

      - name: Install/Restart systemd service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 158.180.68.211
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/home/ubuntu/app"
            RELEASES_DIR="${APP_DIR}/releases"
            CURRENT_JAR="${APP_DIR}/app.jar"
            SERVICE_NAME="nurse-schedule"

            mkdir -p "${RELEASES_DIR}"

            # 업로드된 jar 중 최신 것을 고정 이름(app.jar)으로 교체
            LATEST_JAR="$(ls -t ${RELEASES_DIR}/*.jar | head -n 1)"
            echo "Latest jar: ${LATEST_JAR}"
            cp "${LATEST_JAR}" "${CURRENT_JAR}"

            # systemd 유닛 파일 설치 (없으면 생성)
            if [ ! -f "/etc/systemd/system/${SERVICE_NAME}.service" ]; then
              sudo tee "/etc/systemd/system/${SERVICE_NAME}.service" >/dev/null <<'UNIT'
            [Unit]
            Description=Nurse Schedule Server
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu/app
            ExecStart=/usr/bin/java -jar /home/ubuntu/app/app.jar
            Restart=always
            RestartSec=5
            SuccessExitStatus=143

            # 필요하면 여기에 환경변수를 추가하세요.
            # Environment=SPRING_PROFILES_ACTIVE=prod

            [Install]
            WantedBy=multi-user.target
            UNIT
            fi

            sudo systemctl daemon-reload
            sudo systemctl enable "${SERVICE_NAME}"
            sudo systemctl restart "${SERVICE_NAME}"

            # 최근 로그 일부 출력(디버깅용)
            sudo journalctl -u "${SERVICE_NAME}" -n 80 --no-pager || true
